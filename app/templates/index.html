<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya K | Cloud DevOps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Segoe UI, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; padding: 40px; }
        .badge { display: inline-block; background: #1e40af; color: #93c5fd; padding: 6px 16px; border-radius: 20px; font-size: 13px; margin-bottom: 20px; }
        h1 { font-size: 48px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 18px; color: #94a3b8; margin-bottom: 30px; }
        .status { display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 14px; color: #4ade80; }
        .dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .tags { margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .tag { background: #1e293b; border: 1px solid #334155; padding: 6px 14px; border-radius: 6px; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">DEPLOYED VIA CI/CD PIPELINE</div>
        <h1>Surya K</h1>
        <p>AWS Cloud Developer - DevOps Engineer</p>
        <div class="status">
            <div class="dot"></div>
            Dockerized App Running on AWS EC2
        </div>
        <div class="tags">
            <span class="tag">Docker</span>
            <span class="tag">GitHub Actions</span>
            <span class="tag">AWS EC2</span>
            <span class="tag">CI/CD Pipeline</span>
            <span class="tag">Python Flask</span>
        </div>
    </div>
</body>
</html>
